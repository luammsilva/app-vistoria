<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Safety — Painel Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #f4f5f2;
      --surface: #ffffff;
      --black:   #1a1d1f;
      --gray1:   #4a4f54;
      --gray2:   #6b7280;
      --gray3:   #9ca3af;
      --gray4:   #e5e7eb;
      --green:   #5a8a1e;
      --green-bg:#eef5e0;
      --ns-green:#8dc63f;
      --orange:  #e07b20;
      --orange-bg:#fef3e2;
      --blue:    #1a4a7a;
      --blue-bg: #e8f0f8;
      --red:     #c0392b;
      --red-bg:  #fdecea;
      --radius:  12px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.14);
    }
    html, body { min-height: 100vh; background: var(--bg); color: var(--black); font-family: var(--font-body); font-size: 15px; -webkit-font-smoothing: antialiased; }

    /* ── TELAS ── */
    .tela { display: none; }
    .tela.ativa { display: block; }
    #tela-admin.ativa { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── TOPBAR ── */
    .topbar { background: var(--black); padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .topbar-user { font-size: .8rem; color: #666; }
    .btn-sair { background: #2e2e2b; border: none; border-radius: 8px; color: #f0ede8; cursor: pointer; font-family: var(--font-body); font-size: .8rem; padding: 7px 14px; transition: background .2s; }
    .btn-sair:hover { background: #3e3e3b; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--gray4); padding: 0 32px; background: var(--surface); }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; color: var(--gray2); cursor: pointer; font-family: var(--font-head); font-size: .85rem; font-weight: 600; letter-spacing: .03em; padding: 14px 20px; text-transform: uppercase; transition: all .15s; }
    .tab-btn:hover { color: var(--black); }
    .tab-btn.ativo { border-bottom-color: var(--ns-green); color: var(--black); }

    /* ── MAIN ── */
    .admin-main { flex: 1; padding: 32px; max-width: 1200px; margin: 0 auto; width: 100%; }
    .tab-content { display: none; }
    .tab-content.ativo { display: block; }

    /* ── STATS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 6px; }
    .stat-label { font-size: .75rem; font-weight: 500; color: var(--gray2); letter-spacing: .05em; text-transform: uppercase; }
    .stat-valor { font-family: var(--font-head); font-weight: 800; font-size: 2rem; color: var(--black); line-height: 1; }
    .stat-sub { font-size: .78rem; color: var(--gray3); }

    /* ── LISTA HEADER ── */
    .lista-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
    .lista-titulo { font-family: var(--font-head); font-weight: 700; font-size: 1.2rem; }
    .filtros { display: flex; gap: 10px; flex-wrap: wrap; }
    .filtro-btn { background: var(--surface); border: 1.5px solid var(--gray4); border-radius: 20px; color: var(--gray2); cursor: pointer; font-family: var(--font-body); font-size: .8rem; font-weight: 500; padding: 6px 14px; transition: all .15s; }
    .filtro-btn:hover { border-color: var(--gray2); color: var(--black); }
    .filtro-btn.ativo { background: var(--black); border-color: var(--black); color: #fff; }

    /* ── BOTÃO AÇÃO ── */
    .btn-acao { background: var(--ns-green); border: none; border-radius: 10px; color: #fff; cursor: pointer; font-family: var(--font-head); font-weight: 700; font-size: .82rem; letter-spacing: .03em; padding: 9px 18px; text-transform: uppercase; transition: opacity .15s; display: flex; align-items: center; gap: 6px; }
    .btn-acao:hover { opacity: .88; }
    .btn-acao.vermelho { background: var(--red); }
    .btn-acao.cinza { background: var(--gray2); }

    /* ── VISTORIAS ROWS ── */
    .vistorias-lista { display: flex; flex-direction: column; gap: 10px; }
    .vistoria-row { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 20px; display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 16px; cursor: pointer; transition: box-shadow .2s, transform .15s; border: 1.5px solid transparent; }
    .vistoria-row:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); border-color: var(--gray4); }
    .vr-tipo { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .vr-tipo.retirada { background: var(--blue-bg); }
    .vr-tipo.devolucao { background: var(--green-bg); }
    .vr-info { min-width: 0; }
    .vr-veiculo { font-family: var(--font-head); font-weight: 700; font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .vr-meta { font-size: .78rem; color: var(--gray2); margin-top: 3px; }
    .vr-badge { font-size: .72rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .vr-badge.retirada { background: var(--blue-bg); color: var(--blue); }
    .vr-badge.devolucao { background: var(--green-bg); color: var(--green); }
    .vr-arrow { color: var(--gray3); font-size: 1rem; flex-shrink: 0; }

    /* ── FROTA ROWS ── */
    .frota-lista { display: flex; flex-direction: column; gap: 10px; }
    .frota-row { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 20px; display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 16px; border: 1.5px solid transparent; transition: box-shadow .2s; }
    .frota-row:hover { box-shadow: var(--shadow-lg); }
    .frota-row.inativo { opacity: .5; }
    .locadora-badge { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: .65rem; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; flex-shrink: 0; }
    .locadora-badge.movida { background: var(--orange-bg); color: var(--orange); }
    .locadora-badge.localiza { background: var(--green-bg); color: var(--green); }
    .locadora-badge.sem { background: var(--gray4); color: var(--gray2); }
    .frota-info { min-width: 0; }
    .frota-modelo { font-family: var(--font-head); font-weight: 700; font-size: .95rem; }
    .frota-meta { font-size: .78rem; color: var(--gray2); margin-top: 3px; }
    .frota-placa { background: var(--black); color: #fff; font-weight: 800; font-size: .78rem; padding: 3px 9px; border-radius: 6px; letter-spacing: .06em; flex-shrink: 0; }
    .frota-acoes { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-inativar { background: var(--red-bg); border: 1px solid #f5c6c0; border-radius: 8px; color: var(--red); cursor: pointer; font-size: .75rem; font-weight: 600; padding: 5px 11px; transition: background .15s; }
    .btn-inativar:hover { background: #f9d5d0; }
    .btn-ativar { background: var(--green-bg); border: 1px solid #c3e6a0; border-radius: 8px; color: var(--green); cursor: pointer; font-size: .75rem; font-weight: 600; padding: 5px 11px; transition: background .15s; }
    .btn-ativar:hover { background: #d4efc0; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--gray2); }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; align-items: flex-start; justify-content: center; padding: 24px 16px; overflow-y: auto; backdrop-filter: blur(4px); }
    .modal-overlay.aberto { display: flex; }
    .modal { background: var(--surface); border-radius: 20px; width: 100%; max-width: 720px; box-shadow: var(--shadow-lg); animation: slideUp .3s cubic-bezier(.2,.8,.3,1) both; overflow: hidden; margin: auto; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .modal-header { padding: 22px 24px 18px; border-bottom: 1px solid var(--gray4); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .modal-titulo { font-family: var(--font-head); font-weight: 800; font-size: 1.15rem; }
    .modal-fechar { background: var(--gray4); border: none; border-radius: 8px; color: var(--gray1); cursor: pointer; font-size: .85rem; font-weight: 600; padding: 7px 13px; transition: background .15s; flex-shrink: 0; }
    .modal-fechar:hover { background: var(--gray3); color: #fff; }
    .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; max-height: 80vh; overflow-y: auto; }

    /* ── DETALHE ── */
    .detalhe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .detalhe-item { background: var(--bg); border-radius: 10px; padding: 12px 14px; }
    .detalhe-key { font-size: .72rem; font-weight: 500; color: var(--gray2); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 4px; }
    .detalhe-val { font-weight: 600; font-size: .95rem; color: var(--black); }
    .fotos-titulo { font-family: var(--font-head); font-weight: 700; font-size: .9rem; margin-bottom: 12px; color: var(--gray1); }
    .fotos-detalhe-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .foto-detalhe-wrap { position: relative; border-radius: 12px; overflow: hidden; background: var(--bg); aspect-ratio: 4/3; }
    .foto-detalhe-wrap.painel { grid-column: span 2; aspect-ratio: 16/7; }
    .foto-detalhe-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; cursor: zoom-in; }
    .foto-detalhe-wrap img:hover { transform: scale(1.03); }
    .foto-detalhe-label { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,.6); color: #fff; font-size: .68rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; padding: 3px 8px; border-radius: 5px; }
    .foto-vazia { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--gray3); font-size: .8rem; }

    /* ── FORM CADASTRO ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-campo { display: flex; flex-direction: column; gap: 6px; }
    .form-campo.full { grid-column: span 2; }
    .form-campo label { font-size: .75rem; font-weight: 600; color: var(--gray2); letter-spacing: .05em; text-transform: uppercase; }
    .form-campo input, .form-campo select {
      background: var(--bg); border: 1.5px solid var(--gray4); border-radius: 10px;
      color: var(--black); font-family: var(--font-body); font-size: .95rem;
      padding: 12px 14px; outline: none; transition: border-color .2s; -webkit-appearance: none;
    }
    .form-campo input:focus, .form-campo select:focus { border-color: var(--ns-green); }

    /* Locadora selector */
    .locadora-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .locadora-opt { border: 2px solid var(--gray4); border-radius: 10px; padding: 14px; text-align: center; cursor: pointer; transition: all .15s; }
    .locadora-opt:hover { border-color: var(--gray2); }
    .locadora-opt.sel-movida { border-color: var(--orange); background: var(--orange-bg); }
    .locadora-opt.sel-localiza { border-color: var(--ns-green); background: var(--green-bg); }
    .locadora-opt .loc-nome { font-family: var(--font-head); font-weight: 700; font-size: .9rem; margin-top: 4px; }
    .locadora-opt .loc-emoji { font-size: 1.5rem; }

    /* Fotos cadastro */
    .fotos-cadastro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .foto-cadastro-card {
      border: 2px dashed var(--gray4); border-radius: 10px; aspect-ratio: 4/3;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; cursor: pointer; position: relative; overflow: hidden;
      transition: border-color .2s; font-size: inherit; color: inherit; text-align: center;
    }
    .foto-cadastro-card:hover { border-color: var(--gray2); }
    .foto-cadastro-card.capturada { border-color: var(--ns-green); border-style: solid; }
    .foto-cadastro-card.painel { grid-column: span 2; aspect-ratio: 16/7; }
    .foto-cadastro-card input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 2; }
    .foto-cadastro-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 8px; z-index: 0; }
    .foto-cadastro-card .overlay { position: absolute; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; border-radius: 8px; z-index: 1; }
    .foto-cadastro-card .flabel { font-size: .7rem; font-weight: 600; color: var(--gray2); letter-spacing: .04em; text-transform: uppercase; z-index: 1; }
    .foto-cadastro-icone { font-size: 1.4rem; z-index: 1; }

    /* ── HISTÓRICO ── */
    .historico-veiculo { margin-bottom: 24px; }
    .historico-veiculo-header { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 20px; display: flex; align-items: center; gap: 14px; margin-bottom: 10px; cursor: pointer; }
    .historico-veiculo-header:hover { box-shadow: var(--shadow-lg); }
    .hist-modelo { font-family: var(--font-head); font-weight: 700; font-size: 1rem; flex: 1; }
    .hist-placa { background: var(--black); color: #fff; font-weight: 800; font-size: .75rem; padding: 3px 9px; border-radius: 6px; letter-spacing: .06em; }
    .hist-pares { padding-left: 16px; display: none; flex-direction: column; gap: 8px; }
    .hist-pares.aberto { display: flex; }
    .par-card { background: var(--surface); border-radius: 10px; box-shadow: var(--shadow); padding: 14px 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-left: 4px solid var(--ns-green); }
    .par-card.aberto-ret { border-left-color: var(--blue); }
    .par-col { display: flex; flex-direction: column; gap: 4px; }
    .par-titulo { font-size: .7rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--gray2); margin-bottom: 4px; }
    .par-info { font-size: .82rem; color: var(--black); }
    .par-km { font-family: var(--font-head); font-weight: 700; font-size: 1rem; color: var(--black); }
    .par-km-label { font-size: .7rem; color: var(--gray3); }
    .km-percorrido { background: var(--green-bg); border-radius: 8px; padding: 8px 12px; text-align: center; grid-column: span 2; }
    .km-percorrido .valor { font-family: var(--font-head); font-weight: 800; font-size: 1.2rem; color: var(--green); }
    .km-percorrido .label { font-size: .72rem; color: var(--gray2); }
    .tag-aberta { background: var(--blue-bg); color: var(--blue); border-radius: 6px; font-size: .7rem; font-weight: 700; padding: 2px 8px; width: fit-content; }

    /* ── LIGHTBOX ── */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 300; align-items: center; justify-content: center; cursor: zoom-out; }
    .lightbox.aberto { display: flex; }
    .lightbox img { max-width: 95vw; max-height: 92vh; object-fit: contain; border-radius: 8px; }
    .lightbox-fechar { position: absolute; top: 16px; right: 20px; background: rgba(255,255,255,.15); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 1rem; padding: 8px 14px; }

    /* ── LOADING ── */
    .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(244,245,242,.85); z-index: 400; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
    .loading-overlay.ativo { display: flex; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--gray4); border-top-color: var(--ns-green); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-txt { font-size: .85rem; color: var(--gray2); }

    @media (max-width: 600px) {
      .admin-main { padding: 16px; }
      .topbar { padding: 0 16px; }
      .tabs { padding: 0 16px; overflow-x: auto; }
      .detalhe-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .form-campo.full { grid-column: span 1; }
      .vistoria-row { grid-template-columns: auto 1fr auto; }
      .vr-badge { display: none; }
      .frota-row { grid-template-columns: auto 1fr; }
      .frota-acoes { display: none; }
    }
  </style>
</head>

<script>
  const supabaseUrl = 'https://jpvrarlpifbtdvzzbsjx.supabase.co';
  const supabaseKey = 'sb_publishable__4KCNTPkGpshCATcxmrCVQ_A7TZ9Sab';
  const sb = supabase.createClient(supabaseUrl, supabaseKey);

  const ADMINS = ['luam.silva@nextsafety.com.br'];
  let todasVistorias = [];
  let todaFrota = [];
  let locadoraSelecionada = null;
  let fotosCadastro = { frente: null, traseira: null, esquerda: null, direita: null, painel: null };
  let fotosCadastroBlob = { frente: null, traseira: null, esquerda: null, direita: null, painel: null };

  // ── Utilidades ──
  function mostrarLoading(txt = 'Carregando...') {
    document.getElementById('loading-txt').textContent = txt;
    document.getElementById('loading').classList.add('ativo');
  }
  function esconderLoading() { document.getElementById('loading').classList.remove('ativo'); }

  function formatarData(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' })
      + ' às ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  // ── TABS ──
  function mudarTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('ativo'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('ativo'));
    btn.classList.add('ativo');
    document.getElementById('tab-' + tab).classList.add('ativo');
    if (tab === 'frota') carregarFrota();
    if (tab === 'historico') carregarHistorico();
  }

  // ── LOGOUT ──
  async function fazerLogout() {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  }

  // ══════════════════════════════════
  // VISTORIAS
  // ══════════════════════════════════
  async function carregarVistorias() {
    mostrarLoading();
    const { data, error } = await sb
      .from('vistorias')
      .select('*, veiculos(modelo, placa, cor)')
      .order('data_registro', { ascending: false });
    esconderLoading();
    if (error) { alert('Erro: ' + error.message); return; }
    todasVistorias = data;
    atualizarStats(data);
    renderizarLista(data);
  }

  function atualizarStats(data) {
    document.getElementById('stat-total').textContent = data.length;
    document.getElementById('stat-retiradas').textContent = data.filter(v => v.tipo === 'retirada').length;
    document.getElementById('stat-devolucoes').textContent = data.filter(v => v.tipo === 'devolucao').length;
    const emails = new Set(data.map(v => v.email_logado).filter(Boolean));
    document.getElementById('stat-tecnicos').textContent = emails.size;
  }

  function filtrar(tipo, btn) {
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
    btn.classList.add('ativo');
    const filtradas = tipo === 'todos' ? todasVistorias : todasVistorias.filter(v => v.tipo === tipo);
    renderizarLista(filtradas);
  }

  function renderizarLista(vistorias) {
    const container = document.getElementById('vistorias-lista');
    if (!vistorias.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div>Nenhuma vistoria encontrada</div></div>`;
      return;
    }
    container.innerHTML = vistorias.map(v => {
      const veiculo = v.veiculos;
      const nome = veiculo ? `${veiculo.modelo} — ${veiculo.placa}` : `Veículo #${v.veiculo_id}`;
      const icone = v.tipo === 'retirada' ? '🚗' : '🔑';
      const tecnico = v.email_logado ? v.email_logado.split('@')[0] : 'Desconhecido';
      return `<div class="vistoria-row" onclick="abrirDetalhe(${v.id})">
        <div class="vr-tipo ${v.tipo}">${icone}</div>
        <div class="vr-info">
          <div class="vr-veiculo">${nome}</div>
          <div class="vr-meta">${formatarData(v.data_registro)} · ${tecnico} · ${Number(v.km_atual).toLocaleString('pt-BR')} km</div>
        </div>
        <div class="vr-badge ${v.tipo}">${v.tipo === 'retirada' ? 'Retirada' : 'Devolução'}</div>
        <div class="vr-arrow">›</div>
      </div>`;
    }).join('');
  }

  function abrirDetalhe(id) {
    const v = todasVistorias.find(x => x.id === id);
    if (!v) return;
    const veiculo = v.veiculos;
    const nome  = veiculo ? veiculo.modelo : `Veículo #${v.veiculo_id}`;
    const placa = veiculo ? veiculo.placa : '—';
    const cor   = veiculo ? (veiculo.cor || '—') : '—';
    document.getElementById('modal-titulo').textContent = `${v.tipo === 'retirada' ? '🚗 Retirada' : '🔑 Devolução'} — ${nome}`;
    const fotos = [
      { label: 'Frente', url: v.foto_frente, painel: false },
      { label: 'Traseira', url: v.foto_traseira, painel: false },
      { label: 'Lat. Esq.', url: v.foto_lateral_esq, painel: false },
      { label: 'Lat. Dir.', url: v.foto_lateral_dir, painel: false },
      { label: 'Painel / Km', url: v.foto_painel, painel: true },
    ];
    const fotosHtml = fotos.map(f => `
      <div class="foto-detalhe-wrap${f.painel ? ' painel' : ''}">
        ${f.url ? `<img src="${f.url}" alt="${f.label}" onclick="abrirLightbox('${f.url}')">` : `<div class="foto-vazia">Sem foto</div>`}
        <div class="foto-detalhe-label">${f.label}</div>
      </div>`).join('');
    document.getElementById('modal-body').innerHTML = `
      <div class="detalhe-grid">
        <div class="detalhe-item"><div class="detalhe-key">Veículo</div><div class="detalhe-val">${nome}</div></div>
        <div class="detalhe-item"><div class="detalhe-key">Placa</div><div class="detalhe-val">${placa}</div></div>
        <div class="detalhe-item"><div class="detalhe-key">Cor</div><div class="detalhe-val">${cor}</div></div>
        <div class="detalhe-item"><div class="detalhe-key">KM</div><div class="detalhe-val">${Number(v.km_atual).toLocaleString('pt-BR')} km</div></div>
        <div class="detalhe-item"><div class="detalhe-key">Técnico</div><div class="detalhe-val">${v.email_logado || '—'}</div></div>
        <div class="detalhe-item"><div class="detalhe-key">Data / Hora</div><div class="detalhe-val">${formatarData(v.data_registro)}</div></div>
      </div>
      <div><div class="fotos-titulo">📸 Fotos da vistoria</div><div class="fotos-detalhe-grid">${fotosHtml}</div></div>`;
    document.getElementById('modal-overlay').classList.add('aberto');
    document.body.style.overflow = 'hidden';
  }

  function fecharModal(e) { if (e.target === document.getElementById('modal-overlay')) fecharModalDireto(); }
  function fecharModalDireto() { document.getElementById('modal-overlay').classList.remove('aberto'); document.body.style.overflow = ''; }

  // ══════════════════════════════════
  // FROTA
  // ══════════════════════════════════
  async function carregarFrota() {
    mostrarLoading();
    const { data, error } = await sb.from('veiculos').select('*').order('modelo');
    esconderLoading();
    if (error) { alert('Erro: ' + error.message); return; }
    todaFrota = data;
    renderizarFrota(data);
  }

  function filtrarFrota(filtro, btn) {
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
    btn.classList.add('ativo');
    let filtrada = todaFrota;
    if (filtro === 'ativos') filtrada = todaFrota.filter(v => v.ativo);
    if (filtro === 'inativos') filtrada = todaFrota.filter(v => !v.ativo);
    renderizarFrota(filtrada);
  }

  function renderizarFrota(frota) {
    const container = document.getElementById('frota-lista');
    if (!frota.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">🚗</div><div>Nenhum veículo encontrado</div></div>`;
      return;
    }
    container.innerHTML = frota.map(v => {
      const loc = v.locadora || 'sem';
      const locLabel = loc === 'movida' ? 'Movida' : loc === 'localiza' ? 'Localiza' : '—';
      const kmFormatado = v.km_cadastro ? Number(v.km_cadastro).toLocaleString('pt-BR') + ' km' : '—';
      const dataCad = v.data_cadastro ? new Date(v.data_cadastro).toLocaleDateString('pt-BR') : '—';
      return `<div class="frota-row${v.ativo ? '' : ' inativo'}">
        <div class="locadora-badge ${loc}">${locLabel}</div>
        <div class="frota-info">
          <div class="frota-modelo">${v.modelo}${v.ano ? ' ' + v.ano : ''}${v.cor ? ' · ' + v.cor : ''}</div>
          <div class="frota-meta">Cadastro: ${dataCad} · KM: ${kmFormatado}${!v.ativo ? ' · <strong>Inativo</strong>' : ''}</div>
        </div>
        <div class="frota-placa">${v.placa}</div>
        <div class="frota-acoes">
          ${v.ativo
            ? `<button class="btn-inativar" onclick="toggleAtivo(${v.id}, false)">Inativar</button>`
            : `<button class="btn-ativar" onclick="toggleAtivo(${v.id}, true)">Reativar</button>`
          }
        </div>
      </div>`;
    }).join('');
  }

  async function toggleAtivo(id, ativo) {
    const acao = ativo ? 'reativar' : 'inativar';
    if (!confirm(`Deseja ${acao} este veículo?`)) return;
    mostrarLoading(ativo ? 'Reativando...' : 'Inativando...');
    const { error } = await sb.from('veiculos').update({ ativo }).eq('id', id);
    esconderLoading();
    if (error) { alert('Erro: ' + error.message); return; }
    await carregarFrota();
  }

  // ── Cadastro ──
  function abrirModalCadastro() {
    locadoraSelecionada = null;
    fotosCadastro = { frente: null, traseira: null, esquerda: null, direita: null, painel: null };
    fotosCadastroBlob = { frente: null, traseira: null, esquerda: null, direita: null, painel: null };
    ['frente','traseira','esquerda','direita','painel'].forEach(c => {
      const card = document.getElementById('cad-card-' + c);
      card.classList.remove('capturada');
      card.innerHTML = `<div class="foto-cadastro-icone">📷</div><div class="flabel">${c === 'esquerda' ? 'Lateral Esq.' : c === 'direita' ? 'Lateral Dir.' : c === 'painel' ? 'Painel / Km' : c.charAt(0).toUpperCase() + c.slice(1)}</div><input type="file" accept="image/*" capture="environment" onchange="capturarFotoCadastro('${c}', this)">`;
    });
    document.querySelectorAll('.locadora-opt').forEach(el => el.className = 'locadora-opt');
    ['cad-modelo','cad-placa','cad-ano','cad-cor','cad-km'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('modal-cadastro').classList.add('aberto');
    document.body.style.overflow = 'hidden';
  }

  function fecharModalCadastro(e) { if (e.target === document.getElementById('modal-cadastro')) fecharModalCadastroDireto(); }
  function fecharModalCadastroDireto() { document.getElementById('modal-cadastro').classList.remove('aberto'); document.body.style.overflow = ''; }

  function selecionarLocadora(loc) {
    locadoraSelecionada = loc;
    document.querySelectorAll('.locadora-opt').forEach(el => el.className = 'locadora-opt');
    document.getElementById('loc-' + loc).classList.add('locadora-opt', 'sel-' + loc);
  }

  function capturarFotoCadastro(chave, input) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    const url = URL.createObjectURL(file);
    fotosCadastro[chave] = url;
    fotosCadastroBlob[chave] = file;
    const card = document.getElementById('cad-card-' + chave);
    const isPainel = chave === 'painel';
    card.classList.add('capturada');
    card.innerHTML = `<img src="${url}" alt="${chave}"><div class="overlay" style="font-size:1.5rem;">✅</div><input type="file" accept="image/*" capture="environment" onchange="capturarFotoCadastro('${chave}', this)">`;
  }

  async function uploadFotoCadastro(chave, veiculoId) {
    const file = fotosCadastroBlob[chave];
    if (!file) return null;
    const ext = file.name.split('.').pop() || 'jpg';
    const path = `veiculos/${veiculoId}/${Date.now()}_${chave}.${ext}`;
    const { error } = await sb.storage.from('fotos-vistoria').upload(path, file, { upsert: true });
    if (error) throw new Error(error.message);
    const { data } = sb.storage.from('fotos-vistoria').getPublicUrl(path);
    return data.publicUrl;
  }

  async function salvarVeiculo() {
    const modelo = document.getElementById('cad-modelo').value.trim();
    const placa  = document.getElementById('cad-placa').value.trim().toUpperCase();
    const ano    = document.getElementById('cad-ano').value;
    const cor    = document.getElementById('cad-cor').value.trim();
    const km     = document.getElementById('cad-km').value;

    if (!modelo || !placa) { alert('Preencha pelo menos Modelo e Placa.'); return; }

    mostrarLoading('Salvando veículo...');

    // Inserir veículo primeiro para pegar o ID
    const { data: vData, error: vError } = await sb.from('veiculos').insert({
      modelo, placa, ano: ano ? parseInt(ano) : null,
      cor: cor || null, locadora: locadoraSelecionada,
      km_cadastro: km ? parseInt(km) : null, ativo: true
    }).select().single();

    if (vError) { esconderLoading(); alert('Erro ao salvar: ' + vError.message); return; }

    // Upload das fotos
    const urls = {};
    const chaves = ['frente','traseira','esquerda','direita','painel'];
    for (const chave of chaves) {
      if (fotosCadastroBlob[chave]) {
        document.getElementById('loading-txt').textContent = `Enviando foto: ${chave}...`;
        try { urls[chave] = await uploadFotoCadastro(chave, vData.id); } catch(e) {}
      }
    }

    // Atualizar com as URLs das fotos
    if (Object.keys(urls).length > 0) {
      await sb.from('veiculos').update({
        foto_frente: urls.frente || null,
        foto_traseira: urls.traseira || null,
        foto_lateral_esq: urls.esquerda || null,
        foto_lateral_dir: urls.direita || null,
        foto_painel: urls.painel || null
      }).eq('id', vData.id);
    }

    esconderLoading();
    fecharModalCadastroDireto();
    await carregarFrota();
    alert('Veículo cadastrado com sucesso!');
  }

  // ══════════════════════════════════
  // HISTÓRICO
  // ══════════════════════════════════
  async function carregarHistorico() {
    mostrarLoading();
    const { data: veiculos, error: ve } = await sb.from('veiculos').select('id, modelo, placa, cor').order('modelo');
    const { data: vistorias, error: vi } = await sb.from('vistorias').select('*').order('data_registro', { ascending: true });
    esconderLoading();
    if (ve || vi) { alert('Erro ao carregar histórico'); return; }
    renderizarHistorico(veiculos, vistorias);
  }

  function renderizarHistorico(veiculos, vistorias) {
    const container = document.getElementById('historico-lista');
    if (!veiculos.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><div>Nenhum veículo cadastrado</div></div>`;
      return;
    }

    container.innerHTML = veiculos.map(v => {
      const vistveiculo = vistorias.filter(x => x.veiculo_id === v.id);
      const retiradas = vistveiculo.filter(x => x.tipo === 'retirada');

      const paresHtml = retiradas.map(ret => {
        const dev = vistorias.find(x => x.vistoria_retirada_id === ret.id);
        const kmPercorrido = dev ? (dev.km_atual - ret.km_atual) : null;
        const aberta = !dev;

        return `<div class="par-card${aberta ? ' aberto-ret' : ''}">
          <div class="par-col">
            <div class="par-titulo">🚗 Retirada</div>
            ${aberta ? '<span class="tag-aberta">Em aberto</span>' : ''}
            <div class="par-km">${Number(ret.km_atual).toLocaleString('pt-BR')} km</div>
            <div class="par-km-label">KM na retirada</div>
            <div class="par-info" style="margin-top:6px;">${ret.email_logado ? ret.email_logado.split('@')[0] : '—'}</div>
            <div class="par-info" style="color:var(--gray3);font-size:.75rem;">${formatarData(ret.data_registro)}</div>
          </div>
          <div class="par-col">
            <div class="par-titulo">🔑 Devolução</div>
            ${dev ? `
              <div class="par-km">${Number(dev.km_atual).toLocaleString('pt-BR')} km</div>
              <div class="par-km-label">KM na devolução</div>
              <div class="par-info" style="margin-top:6px;">${dev.email_logado ? dev.email_logado.split('@')[0] : '—'}</div>
              <div class="par-info" style="color:var(--gray3);font-size:.75rem;">${formatarData(dev.data_registro)}</div>
            ` : '<div class="par-info" style="color:var(--gray3);">Aguardando devolução...</div>'}
          </div>
          ${kmPercorrido !== null ? `
            <div class="km-percorrido">
              <div class="valor">+${Number(kmPercorrido).toLocaleString('pt-BR')} km</div>
              <div class="label">percorridos nesta viagem</div>
            </div>` : ''}
        </div>`;
      }).join('') || `<div style="font-size:.85rem;color:var(--gray3);padding:12px 0;">Nenhuma vistoria registrada</div>`;

      return `<div class="historico-veiculo">
        <div class="historico-veiculo-header" onclick="toggleHistVeiculo(${v.id})">
          <div class="hist-modelo">${v.modelo}${v.cor ? ' · ' + v.cor : ''}</div>
          <div class="hist-placa">${v.placa}</div>
          <span style="color:var(--gray3);margin-left:8px;">›</span>
        </div>
        <div class="hist-pares" id="hist-${v.id}">${paresHtml}</div>
      </div>`;
    }).join('');
  }

  function toggleHistVeiculo(id) {
    const el = document.getElementById('hist-' + id);
    el.classList.toggle('aberto');
  }

  // ── Lightbox ──
  function abrirLightbox(url) { document.getElementById('lightbox-img').src = url; document.getElementById('lightbox').classList.add('aberto'); }
  function fecharLightbox() { document.getElementById('lightbox').classList.remove('aberto'); }

  // ── Init ──
  (async () => {
    const { data } = await sb.auth.getSession();
    if (data.session && ADMINS.includes(data.session.user.email)) {
      document.getElementById('topbar-user').textContent = data.session.user.email;
      await carregarVistorias();
      document.getElementById('tela-admin').classList.add('ativa');
    } else {
      window.location.href = 'index.html';
    }
  })();
</script>
</body>
